# General config (anchor: &general)
# All segments inherit these defaults unless overridden
general: &general
  PREFERRED_MODEL: PROPHET
  USED_REGRESSORS:
    SELLIN_MINUS3_MONTH: 1
    MOF_PLUS_BUFFER_MINUS3_MONTH: 0.1
    SR_MINUS3_MONTH: 1
    BILLING_MOVING_AVERAGE_2Q: 1
    BILLING_MOVING_AVERAGE_3Q: 1
    BILLING_MOVING_AVERAGE_4Q: 1
    BILLING_MOVING_AVERAGE_5Q: 1
  NOT_USED_REGRESSORS:
  # Training configuration (which models to train, grid search settings)
  models: [prophet, xgboost, lightgbm, catboost, seasonalnaive, nhits, rnn, autolstm]
  grid_search:
    prophet: true
    xgboost: false
    lightgbm: true
    catboost: true

# Per-segment configuration
# Each segment inherits from &general. Override models/grid_search per segment:
#
#   DESKTOP:
#     <<: *general
#     models: [prophet]           # Only train prophet for DESKTOP
#     grid_search:
#       prophet: false            # Use default params (no grid search)
#
segments:
  ABC:
    <<: *general
  MOBILE:
    <<: *general
  SERVER/WORKSTATION:
    <<: *general
  DESKTOP:
    <<: *general
  GPUDATACENTER: *general
  AIB: *general
  WORK: *general
  IDES: *general
  MISC: *general
  DCGPUCGVDI: *general
  EDG: *general
  EMBEDDED: *general
  DTOEMGPU: *general
  GFXCOMPUTE: *general
  MOBGPU: *general
  GAMING: *general
  SEGMENT_A: *general
  SEGMENT_B: *general
  SEGMENT_C: *general
  SEGMENT_E: *general
  SEGMENT_F: *general
  SEGMENT_G: *general
  SEGMENT_H: *general
  SEGMENT_X: *general

# Segments where SELLIN is excluded from feature selection
EXCLUDE_SELLIN_PROPHET:
  - MOBILE
  - AIB
  - EMBEDDED
EXCLUDE_SELLIN_XGBOOST:
  - AIB
  - EMBEDDED

# Feature selection settings
FEATURE_SELECTION:
  N_FEATURES_GENERAL: 5
  N_FEATURES_EXTENDED: 6
  EXTENDED_SEGMENTS:
    - MOBILE
    - AIB
    - EMBEDDED

# Champion model quality gates
QUALITY_GATES:
  # Maximum allowed APE for a champion model. Pipeline breaks if any champion exceeds this.
  MAX_CHAMPION_MAPE: 200
  # Models below this APE are flagged as suspiciously good (possible data leakage or overfitting)
  MIN_CHAMPION_MAPE: 1

# Prediction sanity checks (applied in 04_inference after post-processing)
PREDICTION_SANITY_CHECKS:
  NEGATIVE_PREDICTION_CHECK: true
  EXTREME_APE_THRESHOLD: 500       # partition mean APE (%) -- more lenient than eval's 200
  FLAT_PREDICTION_CHECK: true
  FLAT_MIN_UNIQUE_VALUES: 2        # min distinct predicted values per partition
  # Indicator-based checks (uses output of calculate_indicators)
  MIN_DIRECTIONAL_CORRECTNESS: 0.25  # partition mean across all demand signals (0-1 scale)
  MAX_VALIDATION_DISTANCE: 3.0       # partition mean across all demand signals (0-4 scale)

# Evaluation configuration
EVALUATION:
  # Horizon range for HORIZON_MAPE calculation and filtering
  # [start, end] inclusive - e.g., [1, 6] means Q+1 through Q+6
  horizon_range: [1, 6]
  BACKTEST:
    stability_penalty: 0.5

# Monitoring configuration (06_model_monitoring -- standalone job, triggered by data refresh)
MONITORING:
  # Backtest: score old predictions against newly available actuals
  BACKTEST_ACTUALS:
    N_PREVIOUS_VERSIONS: 3                 # How many old prediction versions to backtest
    MAPE_RATIO_ALERT_THRESHOLD: 2.0        # Alert if realized MAPE > 2x estimated MAPE
  # Model staleness check (alert if champions are older than threshold)
  STALENESS:
    MAX_MODEL_AGE_DAYS: 30               # Alert if champion models are older than N days

# Interpretability configuration (05_interpretability)
INTERPRETABILITY:
  TOP_N_FEATURES: 10
  TOP_N_SHAP_DEPENDENCE: 3
  TOP_N_SHAP_FEATURES: 5
  TOP_N_PROPHET_PARTITIONS: 5

# Demand signals for indicator calculation (short names match original AMD convention)
DEMAND_SIGNALS:
  - MOF
  - MOF_PLUS_BUFFER
  - SELLIN
  - SR

# =============================================================================
# Model Definitions
# =============================================================================
# Each model specifies:
#   - class: Python import path for the model class
#   - type: Handler type (prophet, sklearn_api, statsforecast)
#   - hyperparameters: Default parameters passed to model constructor
#   - grid: Optional grid search parameters (overrides global grids)
#   - grid_search: Whether to enable grid search for this model
#
# To add a new sklearn-compatible model:
#   1. Add entry here with type: sklearn_api
#   2. Include in model_types widget (e.g., "prophet,xgboost,lightgbm")
#   3. Ensure the package is installed (add to requirements.txt)
# =============================================================================

models:
  # Prophet - uses special handler for make_future_dataframe, add_regressor, etc.
  prophet:
    type: prophet
    n_iter: 50                    # random combinations to try (0 or omit for exhaustive)
    hyperparameters:
      changepoint_prior_scale: 0.001
      seasonality_prior_scale: 0.01
      seasonality_mode: additive
    grid:
      # Includes conservative options (low n_changepoints, tight priors) for brand-level small partitions
      changepoint_prior_scale: [0.001, 0.005, 0.01, 0.1, 0.5]   # 0.005 = very rigid trend for noisy data
      seasonality_prior_scale: [0.01, 0.1, 1.0, 10.0]            # 10.0 = let seasonality fit freely
      seasonality_mode: ["additive", "multiplicative"]
      n_changepoints: [2, 3, 5, 10]                               # 2/3 = fewer changepoints for short series
    settings:
      growth: logistic
      uncertainty_samples: 0
      QUARTERLY_SEASONALITY:
        period: 91.3125
        fourier_order: 5

  # XGBoost - sklearn-compatible API (self-contained: grid, n_iter, early_stopping all here)
  xgboost:
    class: xgboost.XGBRegressor
    type: sklearn_api
    grid_search: true
    n_iter: 50                    # random combinations to try (set -1 for exhaustive)
    early_stopping_rounds: 5      # matches original AMD code
    hyperparameters:
      n_estimators: 40
      learning_rate: 0.1
      max_depth: 6
      min_child_weight: 3
      reg_lambda: 0
      reg_alpha: 0
      subsample: 0.5
      colsample_bytree: 0.8
      tree_method: hist
      objective: reg:squarederror
      random_state: 42
      eval_metric: mae
    grid:
      # Base values from original AMD model class (GENERATE_PREDICTIONS_ALL_QUARTER),
      # expanded with additional values for broader search.
      # Includes shallow/regularized options for brand-level partitions (~20-30 rows).
      n_estimators: [5, 10, 20, 40, 60, 100]      # original: [20, 40, 60]; 5/10 for small partitions
      learning_rate: [0.01, 0.05, 0.1, 0.2]       # original: [0.05, 0.1, 0.2]
      max_depth: [2, 3, 4, 6, 8]                   # original: [6]; 2/3 prevent overfitting on small data
      min_child_weight: [1, 3, 5, 7, 10]           # original: [1, 3, 5]; 7/10 force larger leaf sizes
      reg_lambda: [0, 0.1, 1, 5, 10]               # original: [0]; 5/10 strong L2 for brand-level
      reg_alpha: [0, 0.1, 0.5, 1.0]                # original: [0]; L1 sparsity for few-feature partitions
      subsample: [0.4, 0.5, 0.6, 0.8]              # original: [0.5]; 0.8 helps when rows are scarce
      colsample_bytree: [0.5, 0.7, 0.8, 0.9]       # original: [0.8]; 0.5 forces feature dropout
      tree_method: [hist]                           # original: [hist]
      objective: [reg:squarederror]                 # original: [reg:squarederror]
      random_state: [42]                            # original: [42]
      eval_metric: [mae]                            # original: [rmse] -- changed to mae

  # LightGBM - sklearn-compatible API
  lightgbm:
    class: lightgbm.LGBMRegressor
    type: sklearn_api
    grid_search: true
    n_iter: 50
    hyperparameters:
      n_estimators: 40
      learning_rate: 0.1
      num_leaves: 31
      max_depth: -1
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0
      reg_lambda: 0
      random_state: 42
      verbose: -1
    grid:
      n_estimators: [10, 20, 40, 60, 100]          # 10 for small partitions
      learning_rate: [0.01, 0.05, 0.1, 0.2]
      num_leaves: [7, 10, 15, 31, 63]              # 7/10 constrain complexity for brand-level
      max_depth: [3, 4, 6, 10, -1]                 # 3/4 shallow trees for small data; -1 = unlimited
      min_child_samples: [3, 5, 10, 20, 30]        # 3/5 needed when partitions have ~20-30 rows
      reg_alpha: [0, 0.1, 1.0]                     # L1 regularization
      reg_lambda: [0, 0.1, 1.0, 5.0]               # L2 regularization for brand-level

  # CatBoost - sklearn-compatible API
  catboost:
    class: catboost.CatBoostRegressor
    type: sklearn_api
    grid_search: true
    n_iter: 50
    hyperparameters:
      iterations: 100
      learning_rate: 0.1
      max_depth: 6
      l2_leaf_reg: 3
      random_seed: 42
      verbose: false
      allow_writing_files: false  # required for Spark workers (no write access)
    grid:
      iterations: [50, 100, 200]
      learning_rate: [0.01, 0.05, 0.1]
      max_depth: [2, 3, 4, 6]                      # 2/3 for brand-level small partitions
      l2_leaf_reg: [1, 3, 5, 10]                    # higher values regularize for small data
      min_data_in_leaf: [1, 3, 5]                   # low values needed for ~20-30 row partitions

  # Random Forest - sklearn baseline
  random_forest:
    class: sklearn.ensemble.RandomForestRegressor
    type: sklearn_api
    grid_search: false
    hyperparameters:
      n_estimators: 100
      max_depth: 10
      min_samples_split: 5
      min_samples_leaf: 2
      random_state: 42
      n_jobs: -1

  # Ridge Regression - simple linear baseline
  ridge:
    class: sklearn.linear_model.Ridge
    type: sklearn_api
    grid_search: false
    hyperparameters:
      alpha: 1.0
      random_state: 42

  # ---------------------------------------------------------------------------
  # StatsForecast Models (univariate baselines - no regressors)
  # ---------------------------------------------------------------------------

  # SeasonalNaive - uses last year's same quarter as prediction
  seasonalnaive:
    class: statsforecast.models.SeasonalNaive
    type: statsforecast
    hyperparameters:
      season_length: 4  # quarterly data

  # AutoARIMA - automatic ARIMA model selection
  autoarima:
    class: statsforecast.models.AutoARIMA
    type: statsforecast
    hyperparameters:
      season_length: 4

  # ---------------------------------------------------------------------------
  # Deep Learning / Foundation Models (opt-in only, not in general.models)
  # ---------------------------------------------------------------------------

  # NHITS - Nixtla deep learning model (trained locally per partition)
  # input_size=4 (1 year lookback) keeps it viable for brand-level partitions with ~20-30 rows.
  # Higher max_steps with early_stop_patience prevents both under- and over-training.
  nhits:
    class: neuralforecast.models.NHITS
    type: neuralforecast
    hyperparameters:
      input_size: 4                   # quarters of lookback (keep low for brand-level)
      h: 6                            # forecast horizon (Q+1 through Q+6)
      max_steps: 200
      learning_rate: 0.001
      early_stop_patience_steps: 10
      val_check_steps: 20
      n_pool_kernel_size: [1, 1, 1]   # no pooling -- preserves signal in short series
      accelerator: cpu
      enable_progress_bar: false

  # RNN - Nixtla vanilla RNN (Elman network)
  rnn:
    class: neuralforecast.models.RNN
    type: neuralforecast
    hyperparameters:
      input_size: 4
      h: 6
      max_steps: 200
      learning_rate: 0.001
      encoder_hidden_size: 32
      encoder_n_layers: 1
      early_stop_patience_steps: 10
      val_check_steps: 20
      accelerator: cpu
      enable_progress_bar: false

  # AutoLSTM - Nixtla LSTM with automatic hyperparameter selection
  autolstm:
    class: neuralforecast.auto.AutoLSTM
    type: neuralforecast
    hyperparameters:
      h: 6
      accelerator: cpu
      enable_progress_bar: false
      num_samples: 5              # number of hyperparameter configs to try
      max_steps: 200
      backend: optuna             # ray fails on Databricks single-node clusters
      start_padding_enabled: true # pad short series so Optuna trials don't crash
      input_size: 4               # constrain lookback; Optuna default can exceed data length


