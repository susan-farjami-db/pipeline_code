# model_config_basic.yaml -- mimics original GENERATE_PREDICTIONS_ALL_QUARTER.ipynb
#
# Key differences from the "extended" model_config.yaml:
#   - Only Prophet trained per partition (matches PREFERRED_MODEL = PROPHET)
#   - No grid search for Prophet (fixed params from original train_params)
#   - XGBoost available but not in the default models list
#   - XGBoost grid matches original exhaustive itertools.product search (27 combos)
#   - eval_metric = rmse for XGBoost (matches original)

general: &general
  PREFERRED_MODEL: PROPHET
  USED_REGRESSORS:
    SELLIN_MINUS3_MONTH: 1
    MOF_PLUS_BUFFER_MINUS3_MONTH: 0.1
    SR_MINUS3_MONTH: 1
    BILLING_MOVING_AVERAGE_2Q: 1
    BILLING_MOVING_AVERAGE_3Q: 1
    BILLING_MOVING_AVERAGE_4Q: 1
    BILLING_MOVING_AVERAGE_5Q: 1
  NOT_USED_REGRESSORS:
  models: [prophet, xgboost]
  grid_search:
    prophet: false
    xgboost: true

segments:
  MOBILE:
    <<: *general
  SERVER/WORKSTATION:
    <<: *general
  DESKTOP:
    <<: *general
  GPUDATACENTER: *general
  AIB: *general
  WORK: *general
  IDES: *general
  MISC: *general
  DCGPUCGVDI: *general
  EDG: *general
  EMBEDDED: *general
  DTOEMGPU: *general
  GFXCOMPUTE: *general
  MOBGPU: *general
  GAMING: *general

# SELLIN exclusion lists (matches original exactly)
# Prophet: MOBILE, AIB, EMBEDDED
# XGBoost: AIB, EMBEDDED (original does NOT exclude MOBILE for XGBoost)
EXCLUDE_SELLIN_PROPHET:
  - MOBILE
  - AIB
  - EMBEDDED
EXCLUDE_SELLIN_XGBOOST:
  - AIB
  - EMBEDDED

# Feature selection (matches original: 5 general, 6 for extended segments)
FEATURE_SELECTION:
  N_FEATURES_GENERAL: 5
  N_FEATURES_EXTENDED: 6
  EXTENDED_SEGMENTS:
    - MOBILE
    - AIB
    - EMBEDDED

QUALITY_GATES:
  MAX_CHAMPION_MAPE: 200
  MIN_CHAMPION_MAPE: 1

PREDICTION_SANITY_CHECKS:
  NEGATIVE_PREDICTION_CHECK: true
  EXTREME_APE_THRESHOLD: 500
  FLAT_PREDICTION_CHECK: true
  FLAT_MIN_UNIQUE_VALUES: 2
  MIN_DIRECTIONAL_CORRECTNESS: 0.25
  MAX_VALIDATION_DISTANCE: 3.0

EVALUATION:
  horizon_range: [1, 6]

DEMAND_SIGNALS:
  - MOF
  - MOF_PLUS_BUFFER
  - SELLIN
  - SR

models:
  # Prophet -- fixed params matching original train_params exactly
  prophet:
    type: prophet
    hyperparameters:
      changepoint_prior_scale: 0.001
      seasonality_prior_scale: 0.01
      seasonality_mode: additive
    settings:
      growth: logistic
      uncertainty_samples: 0
      QUARTERLY_SEASONALITY:
        period: 91.3125
        fourier_order: 5

  # XGBoost -- grid matches original FORECASTINGMODEL_XGBOOST_PROPHET class (27 combos)
  # Not in general.models by default, but available if you add it
  xgboost:
    class: xgboost.XGBRegressor
    type: sklearn_api
    grid_search: true
    n_iter: -1                     # exhaustive (matches original itertools.product)
    early_stopping_rounds: 5
    hyperparameters:
      n_estimators: 40
      learning_rate: 0.1
      max_depth: 6
      min_child_weight: 3
      reg_lambda: 0
      reg_alpha: 0
      subsample: 0.5
      colsample_bytree: 0.8
      tree_method: hist
      objective: reg:squarederror
      random_state: 42
      eval_metric: rmse
    grid:
      n_estimators: [20, 40, 60]
      learning_rate: [0.05, 0.1, 0.2]
      max_depth: [6]
      min_child_weight: [1, 3, 5]
      reg_lambda: [0]
      reg_alpha: [0]
      subsample: [0.5]
      colsample_bytree: [0.8]
      tree_method: [hist]
      objective: [reg:squarederror]
      random_state: [42]
      eval_metric: [rmse]
